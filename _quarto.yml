project:
  type: website
  output-dir: docs

resources:
  - "favicon.png"
  - "CNAME"
  - "resources/*"
  - "articles/*"
  - "presentations/*"

website:
  title: "Richard Aubrey White, Ph.D."
  site-url: "https://www.rwhite.no"
  favicon: favicon.png
  body-header: |
    <script data-goatcounter="https://rwhiteno.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  navbar:
    background: "#231c16"
    pinned: false
    left:
      - text: "Home"
        href: index.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Presentations"
        href: presentations.qmd
      - text: "Writing"
        href: writing.qmd
      - text: "CV"
        href: cv.qmd
    right:
      - text: "R packages"
        menu:
          - text: "cohort"
            href: /cohort/
          - text: "org"
            href: /org/
          - text: "plnr"
            href: /plnr/
      - icon: github
        href: https://github.com/raubreywhite
      - icon: twitter-x
        href: https://www.x.com/raubreywhite

format:
  html:
    theme: styles.scss
    title-block-style: none
    anchor-sections: false
    link-external-newwindow: true
